<!DOCTYPE html>
<html lang="ro">
<head>
<link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* BASE */
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;

    background:
        radial-gradient(circle at 20% 20%, #0ea5e9 0%, transparent 40%),
        radial-gradient(circle at 80% 30%, #6366f1 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, #22c55e 0%, transparent 40%);

    opacity: 0.4;
    filter: blur(100px);
}

/* LAYOUT */
.container {
    max-width: 1400px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
}

/* GLASS */
.glass {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
}

/* SIDEBAR */
.sidebar {
    padding: 20px;
    border-radius: 20px;
}

/* NAV */
.nav-title {
    font-size: 12px;
    letter-spacing: 2px;
    color: #94a3b8;
    margin-bottom: 10px;
}

.nav-link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    color: #94a3b8;
    transition: 0.2s;
}

.nav-link:hover {
    background: rgba(255,255,255,0.05);
    color: white;
}

.nav-link.active {
    background: #2563eb;
    color: white;
}

.nav-link small {
    display: block;
    font-size: 11px;
    opacity: 0.7;
}

/* MAIN */
.main {
    padding: 25px;
    border-radius: 20px;
}

/* HEADER */
.header {
    margin-bottom: 25px;
}

.header h1 {
    margin: 0;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    padding: 20px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(30,58,138,0.4), rgba(16,185,129,0.25));
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    border-color: #38bdf8;
}

.card i {
    font-size: 22px;
    margin-bottom: 10px;
    color: #38bdf8;
}

.card h3 {
    margin: 5px 0;
}

.card p {
    font-size: 13px;
    color: #cbd5f5;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar glass">

<div class="nav-title">PHANTOM SYSTEM</div>

<a href="index.html" class="nav-link active">
<i class="fa-solid fa-house"></i>
<div>
<b>Dashboard</b>
<small>Pagina principală</small>
</div>
</a>



<a href="pontaj.html" class="nav-link">
<i class="fa-solid fa-computer"></i>
<div>
<b>Staff Activity</b>
<small>Utilizare sistem</small>
</div>
</a>

<a href="concediu.html" class="nav-link">
<i class="fa-solid fa-file-signature"></i>
<div>
<b>Cerere Concediu</b>
<small>Formular solicitare</small>
</div>
</a>

</div>

<!-- MAIN -->
<div class="main glass">

<div class="header">
<h1>Dashboard Sistem</h1>
<p style="color:#94a3b8;">Acces rapid la module</p>
</div>

<div class="grid">



<a href="pontaj.html" class="card">
<i class="fa-solid fa-computer"></i>
<h3>Staff Activity</h3>
<p>Management examinări</p>
</a>

<a href="concediu.html" class="card">
<i class="fa-solid fa-file-signature"></i>
<h3>Cerere Concediu</h3>
<p>Trimite solicitare</p>
</a>

</div>

</div>

</div>

</body>
</html>
