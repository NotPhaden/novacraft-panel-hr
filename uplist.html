<style>

body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
        radial-gradient(circle at 20% 20%, #0ea5e9 0%, transparent 40%),
        radial-gradient(circle at 80% 30%, #6366f1 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, #22c55e 0%, transparent 40%);
    opacity: 0.4;
    filter: blur(100px);
}

.container {
    max-width: 1400px;
    margin: 40px auto;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
}

.glass {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
}

.sidebar {
    padding: 20px;
    border-radius: 20px;
}

.nav-link {
    display: flex;
    gap: 10px;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    color: #94a3b8;
    margin-bottom: 6px;
    transition: 0.2s;
}

.nav-link:hover {
    background: rgba(255,255,255,0.05);
    color: white;
}

.nav-link.active {
    background: #2563eb;
    color: white;
}

.main {
    padding: 25px;
    border-radius: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
}

.card {
    padding: 15px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(30,58,138,0.4), rgba(16,185,129,0.25));
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
}

.card:hover {
    border-color: #38bdf8;
    transform: translateY(-3px);
}

.code {
    font-size: 20px;
    font-weight: bold;
}

.desc {
    font-size: 14px;
    color: #cbd5f5;
    margin-top: 5px;
}

.tag {
    float: right;
    font-size: 10px;
    padding: 4px 6px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    color: #38bdf8;
}

</style>
</head>

<body>
